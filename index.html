<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ナウエル｜業務改善サポート</title>
    <meta
      name="description"
      content="他社向け業務改善サポート事業のランディングページです。ITお困りごと診断からスポット支援、月額相談、RPA導入まで対応。"
    />
    <style>
      :root {
        --bg: #f7f9fc;
        --surface: #ffffff;
        --ink: #1f2937;
        --muted: #5b6474;
        --brand: #2563eb;
        --brand-dark: #1d4ed8;
        --accent: #16a34a;
        --border: #e5e7eb;
        --shadow: 0 8px 22px rgba(15, 23, 42, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", "Meiryo", sans-serif;
        color: var(--ink);
        background: var(--bg);
        line-height: 1.7;
      }

      .container {
        width: min(1080px, 92%);
        margin: 0 auto;
      }

      .hero {
        background: linear-gradient(130deg, #1d4ed8, #2563eb 55%, #38bdf8);
        color: #fff;
        padding: 72px 0 56px;
      }

      .hero h1 {
        margin: 0;
        font-size: clamp(1.8rem, 4vw, 3rem);
        line-height: 1.25;
      }

      .hero p {
        margin: 16px 0 0;
        max-width: 760px;
        font-size: 1.05rem;
      }

      .badge {
        display: inline-block;
        background: rgba(255, 255, 255, 0.2);
        border: 1px solid rgba(255, 255, 255, 0.35);
        padding: 6px 12px;
        border-radius: 999px;
        margin-bottom: 18px;
        font-size: 0.9rem;
      }

      .lead {
        padding: 42px 0 14px;
      }

      .lead-box {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 16px;
        box-shadow: var(--shadow);
        padding: 22px;
      }

      h2 {
        margin: 0 0 10px;
        font-size: clamp(1.4rem, 2.6vw, 2rem);
      }

      .cards {
        display: grid;
        gap: 18px;
        margin: 24px 0 52px;
      }

      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 16px;
        box-shadow: var(--shadow);
        padding: 24px;
      }

      .card-header {
        display: flex;
        flex-wrap: wrap;
        gap: 8px 14px;
        align-items: baseline;
        margin-bottom: 10px;
      }

      .card h3 {
        margin: 0;
        font-size: 1.28rem;
      }

      .price {
        color: var(--brand-dark);
        font-weight: 700;
      }

      .subtitle {
        color: var(--muted);
        margin: 0 0 16px;
      }

      .grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 16px;
      }

      .box {
        background: #f8fafc;
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 14px 16px;
      }

      .box h4 {
        margin: 0 0 8px;
        font-size: 1rem;
      }

      ul {
        margin: 0;
        padding-left: 1.1rem;
      }

      .purpose {
        color: #0f5132;
      }

      .target {
        color: #5a3d00;
      }

      .cta {
        background: #0f172a;
        color: #fff;
        border-radius: 16px;
        padding: 30px 24px;
        margin: 8px 0 64px;
      }

      .cta h2 {
        margin-bottom: 8px;
      }

      .cta p {
        margin: 0 0 14px;
        color: #cbd5e1;
      }

      .cta strong {
        color: #fff;
      }

      .cta-btn {
        display: inline-block;
        text-decoration: none;
        background: var(--accent);
        color: #fff;
        padding: 12px 18px;
        border-radius: 10px;
        font-weight: 700;
        margin-top: 6px;
      }

      footer {
        text-align: center;
        color: var(--muted);
        padding-bottom: 24px;
      }

      @media (min-width: 860px) {
        .grid {
          grid-template-columns: 1.2fr 1fr;
        }
      }
    </style>
  </head>
  <body>
    <header class="hero">
      <div class="container">
        <span class="badge">業務改善サポート</span>
        <h1>準備中...</h1>
    <footer>
      <small>© 情シス業務改善サポート</small>
    </footer>
  </body>
</html>
